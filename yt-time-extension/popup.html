<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yt-time</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header>
      <h2>⏱️ yt-time</h2>
    </header>

    <main>
      <!-- Time display -->
      <div class="time-display-section">
        <div class="stat-label">本日の視聴時間</div>
        <div id="time-spent" class="time-value">00:00:00</div>
        
        <!-- Progress bar -->
        <div class="progress-container">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        
        <div class="limit-info">
          <span>制限時間: <span id="time-limit-text">2時間</span></span>
        </div>
      </div>

      <!-- Limit Settings Form -->
      <div class="settings-section">
        <div class="stat-label">制限時間の設定</div>
        <div class="input-group">
          <input type="number" id="custom-limit-input" min="1" max="1440" value="120" placeholder="分">
          <button id="save-limit-button" class="btn btn-primary">適用</button>
        </div>
      </div>

      <!-- Status tag -->
      <div id="status-badge" class="status-badge status-ok">
        動画視聴可能
      </div>

      <!-- Debug Tools (Collapsible or simple list) -->
      <div class="debug-section">
        <div class="debug-title">デバッグツール</div>
        <div class="debug-controls">
          <div class="toggle-control">
            <label class="switch">
              <input type="checkbox" id="debug-limit-toggle">
              <span class="slider round"></span>
            </label>
            <span class="control-label">テスト用制限 (10秒)</span>
          </div>
          <button id="reset-button" class="btn btn-danger">視聴時間をリセット</button>
        </div>
      </div>
    </main>

  </div>
  <script src="popup.js"></script>
</body>
</html>
